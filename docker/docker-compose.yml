services:

  # MySQL Database
  mysql:
    image: mysql:8.3
    container_name: onetap-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-12345}
      MYSQL_DATABASE: ssdd_prac2
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-12345}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Utility Service
  utility-service:
    build:
      context: ..
      dockerfile: docker/utility-service.Dockerfile
    container_name: onetap-utility-service
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # App Service
  app-service:
    build:
      context: ..
      dockerfile: docker/app-service.Dockerfile
    container_name: onetap-app-service
    ports:
      - "8443:8443"
    environment:
      DB_PASSWORD: ${DB_PASSWORD:-12345}
      UTILITY_SERVICE_URL: http://utility-service:8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ssdd_prac2?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-k", "-f", "https://localhost:8443/"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s

volumes:
  mysql_data:

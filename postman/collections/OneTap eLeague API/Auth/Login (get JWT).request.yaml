$kind: http-request
description: Authenticates a user and returns a JWT Bearer token. The test script automatically saves the token to the `token` collection variable.
url: "{{baseUrl}}/api/v1/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "username": "admin",
      "password": "pass123"
    }
scripts:
  - type: afterResponse
    code: |-
      var json = pm.response.json();
      if (json.token) {
          var raw = json.token.replace('Bearer ', '');
          pm.collectionVariables.set('token', raw);
          console.log('Token saved.');
      }
    language: text/javascript
order: 1000

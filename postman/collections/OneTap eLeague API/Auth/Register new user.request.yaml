$kind: http-request
description: Registers a new user. Returns 201 Created with a JWT token.
url: "{{baseUrl}}/api/v1/auth/register"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "name": "Test User",
      "nickname": "testuser",
      "email": "test@urjc.es",
      "university": "URJC",
      "password": "password123"
    }
order: 2000

$kind: collection
description: |-
  Complete REST API collection for OneTap eLeague (Práctica 3 SSDD).

  **Setup:**
  1. Set the `baseUrl` variable to `https://localhost:8443` (or your deployed URL).
  2. Call `POST /api/v1/auth/login` to get a JWT token.
  3. The `token` variable is used automatically in authenticated requests.

  **Credentials (default):**
  - Admin: `admin` / `pass123`
  - User:  `user` / `pass123`
variables:
  baseUrl: https://localhost:8443
  token: ""

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneTap eLeague - Crear Partido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/create-edit-tournament.css">
</head>

<body>

    {{> header}}

    <!-- MAIN -->
    <main class="container py-5">
        <div class="mb-4">
            <a href="/admin" class="text-cyan text-decoration-none small text-uppercase"><i class="bi bi-arrow-left"></i> Panel Admin</a>
        </div>
        
        <div class="row justify-content-center">
            <div class="col-lg-10">

                <div class="text-center mb-5">
                    <h2 class="text-white text-uppercase">
                        <i class="bi bi-calendar-plus text-cyan me-2"></i>Crear Nuevo <span class="text-cyan">Partido</span>
                    </h2>
                    <p class="text-white-50">Crea un enfrentamiento y asígnalo a un torneo existente.</p>
                </div>

                <div class="card bg-card border-0 shadow-lg p-4 p-md-5 position-relative overflow-hidden">
                    <div class="position-absolute top-0 start-0 w-100 neon-green"></div>

                    <form action="/admin/matches/create" method="POST">
                        <input type="hidden" name="{{_csrf.parameterName}}" value="{{_csrf.token}}" />

                        <!-- ── Tournament ── -->
                        <h4 class="text-white mb-4 fs-5 border-bottom border-secondary border-opacity-25 pb-2">
                            Torneo
                        </h4>

                        <div class="row g-4 mb-2">
                            <div class="col-md-8">
                                <label class="form-label small text-uppercase fw-bold text-cyan">Selecciona el Torneo</label>
                                <select id="sel-torneo" name="tournamentId" class="form-select bg-dark text-white border-secondary border-opacity-50" required onchange="actualizarJuego(this)">
                                    <option value="" disabled selected>— Selecciona un torneo —</option>
                                    {{#tournaments}}
                                    <option value="{{id}}" data-game="{{game}}">{{name}}</option>
                                    {{/tournaments}}
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small text-uppercase fw-bold text-cyan">Juego</label>
                                <input id="torneo-juego" type="text" class="form-control bg-dark text-white border-secondary border-opacity-50" placeholder="Auto" readonly>
                            </div>
                        </div>

                        <!-- ── Teams ── -->
                        <h4 class="text-white mb-4 fs-5 border-bottom border-secondary border-opacity-25 pb-2 mt-4">
                            Equipos
                        </h4>

                        <div class="row g-4 mb-4">
                            <div class="col-md-6">
                                <label class="form-label small text-uppercase fw-bold text-cyan">Equipo Local</label>
                                <select name="localTeamId" class="form-select bg-dark text-white border-secondary border-opacity-50" required>
                                    <option value="" disabled selected>Selecciona equipo...</option>
                                    {{#teams}}
                                    <option value="{{id}}">{{name}}</option>
                                    {{/teams}}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label small text-uppercase fw-bold text-cyan">Equipo Visitante</label>
                                <select name="awayTeamId" class="form-select bg-dark text-white border-secondary border-opacity-50" required>
                                    <option value="" disabled selected>Selecciona equipo...</option>
                                    {{#teams}}
                                    <option value="{{id}}">{{name}}</option>
                                    {{/teams}}
                                </select>
                            </div>
                        </div>

                        <!-- ── Match Details ── -->
                        <h4 class="text-white mb-4 fs-5 border-bottom border-secondary border-opacity-25 pb-2 mt-5">
                            Detalles del Partido
                        </h4>

                        <div class="row g-4 mb-4">
                            <div class="col-md-4">
                                <label class="form-label small text-uppercase fw-bold text-cyan">Fase</label>
                                <select name="phase" class="form-select bg-dark text-white border-secondary border-opacity-50" required>
                                    <option value="" disabled selected>Selecciona fase...</option>
                                    <option value="Fase de Grupos">Fase de Grupos</option>
                                    <option value="Cuartos de Final">Cuartos de Final</option>
                                    <option value="Semifinal">Semifinal</option>
                                    <option value="Final">Final</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small text-uppercase fw-bold text-cyan">Formato</label>
                                <select name="format" class="form-select bg-dark text-white border-secondary border-opacity-50" required>
                                    <option value="" disabled selected>Selecciona...</option>
                                    <option value="BO1">BO1</option>
                                    <option value="BO3">BO3</option>
                                    <option value="BO5">BO5</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small text-uppercase fw-bold text-cyan">Fecha</label>
                                <input type="date" name="date" class="form-control bg-dark text-white border-secondary border-opacity-50" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label small text-uppercase fw-bold text-cyan">Hora</label>
                                <input type="time" name="time" class="form-control bg-dark text-white border-secondary border-opacity-50" required>
                            </div>
                            <div class="col-md-8">
                                <label class="form-label small text-uppercase fw-bold text-cyan">Notas adicionales</label>
                                <input type="text" name="notes" class="form-control bg-dark text-white border-secondary border-opacity-50" placeholder="Ej: Sala privada #1234, stream en Twitch...">
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-3 mt-5">
                            <a href="/admin" class="btn btn-outline-danger px-4">Cancelar</a>
                            <button type="submit" class="btn btn-primary px-5 fw-bold">
                                <i class="bi bi-calendar-plus-fill me-2"></i>CREAR PARTIDO
                            </button>
                        </div>

                    </form>
                </div>

            </div>
        </div>
    </main>

    {{> footer}}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function actualizarJuego(select) {
            const option = select.options[select.selectedIndex];
            const game = option.getAttribute('data-game');
            document.getElementById('torneo-juego').value = game || '';
        }
    </script>

</body>
</html>

#https config
server.port=8443
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=123456
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=onetap
# Mustache Config
spring.mustache.expose-session-attributes=true
spring.mustache.suffix=.html

# Importar variables de entorno si hay un archivo .env local
spring.config.import=optional:file:.env[.properties]

# Database Properties (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/ssdd_prac2?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:12345}

# JPA / Hibernate Config
# Se usará 'update' para que Hibernate cree las tablas automáticamente según nuestras Entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# Multipart configuration para subida de imágenes
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

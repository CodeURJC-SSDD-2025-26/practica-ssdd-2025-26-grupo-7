# HTTPS configuration
server.port=8443
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=123456
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=onetap
# Mustache Configuration
spring.mustache.expose-session-attributes=true
spring.mustache.suffix=.html

# Import environment variables from a local .env file if present
spring.config.import=optional:file:.env[.properties]

# Database Properties (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/ssdd_prac2?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:12345}

# JPA / Hibernate Configuration
# Use 'update' so Hibernate automatically creates/updates tables based on our Entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
spring.mustache.charset=UTF-8

# Multipart configuration for image uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

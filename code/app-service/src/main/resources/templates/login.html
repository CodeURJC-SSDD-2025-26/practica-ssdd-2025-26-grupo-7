<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneTap eLeague - Iniciar Sesión</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/login.css">
</head>
<!--NAVBAR-->
<body>
    {{> header}}
<!-- MAIN -->
    <main class="login-wrapper d-flex align-items-center py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-5">
                    <div class="card login-card border-0 shadow-lg">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <img src="/assets/images/logo.png" alt="OneTap Logo" height="60" class="mb-3">
                                <h2 class="text-white">ACCESO <span style="color: var(--primary-cyan);">PLAYER</span>
                                </h2>
                                <p class="text-white-50">Inicia sesión para competir</p>
                            </div>

                            <form action="/login" method="post">
                                {{#registered}}
                                <div class="alert alert-success mt-3 mb-3 fw-bold text-center" role="alert" style="background-color: var(--accent-green); color: black; border: none;">
                                    ¡Cuenta creada con éxito! Ya puedes entrar.
                                </div>
                                {{/registered}}
                                
                                {{#error}}
                                <div class="alert alert-danger mb-3" role="alert">
                                    Usuario o contraseña incorrectos.
                                </div>
                                {{/error}}
                                <input type="hidden" name="{{_csrf.parameterName}}" value="{{_csrf.token}}" />
                                <div class="mb-3">
                                    <label class="form-label small text-uppercase fw-bold"
                                        style="color: var(--primary-cyan);">Usuario</label>
                                    <input type="text" name="username" class="form-control custom-input" placeholder="Tu usuario"
                                        required>
                                </div>

                                <div class="mb-3">
                                    <div class="d-flex justify-content-between">
                                        <label class="form-label small text-uppercase fw-bold"
                                            style="color: var(--primary-cyan);">Contraseña</label>
                                        <a href="#" class="text-decoration-none small text-white-50">¿Olvidaste tu
                                            clave?</a>
                                    </div>
                                    <input type="password" name="password" class="form-control custom-input" placeholder="••••••••"
                                        required>
                                </div>

                                <div class="mb-4 form-check">
                                    <input type="checkbox" class="form-check-input" id="remember">
                                    <label class="form-check-label small text-white-50" for="remember">Mantener sesión
                                        activa</label>
                                </div>

                                <button type="submit" class="btn btn-primary w-100 mb-3">
                                    ENTRAR AHORA
                                </button>

                                <div class="text-center mt-4">
                                    <p class="text-white-50 small mb-0">¿Eres nuevo en la liga?</p>
                                    <a href="/register" class="text-decoration-none fw-bold"
                                        style="color: var(--accent-green);">CREAR CUENTA NUEVA</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
{{> footer}}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneTap eLeague - Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/login.css">
    </head>

<body>
    {{> header}}

    <!-- MAIN SECTION -->

    <main class="register-wrapper d-flex align-items-center py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card login-card border-0 shadow-lg">
                        <div class="card-body p-5">
                            <div class="text-center mb-4">
                                <img src="/assets/images/logo.png" alt="OneTap Logo" height="60" class="mb-3">
                                <h2 class="text-white">UNIRSE A LA <span
                                        style="color: var(--primary-cyan);">LEAGUE</span></h2>
                                <p class="text-white-50">Crea tu perfil de competidor</p>
                            </div>

                            <form action="/register" method="POST" enctype="multipart/form-data">
                                <input type="hidden" name="{{_csrf.parameterName}}" value="{{_csrf.token}}" />
                                
                                {{#error}}
                                <div class="alert alert-danger" role="alert">
                                    {{error}}
                                </div>
                                {{/error}}
                            
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label small text-uppercase fw-bold"
                                            style="color: var(--primary-cyan);">Nombre Completo</label>
                                        <input type="text" name="name" class="form-control custom-input"
                                            placeholder="Ej: Juan Pérez" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label small text-uppercase fw-bold"
                                            style="color: var(--primary-cyan);">Gamertag (ID)</label>
                                        <input type="text" name="nickname" class="form-control custom-input"
                                            placeholder="Ej: NoobMaster" required>
                                    </div>

                                    <div class="col-md-6 mb-3">
                                        <label class="form-label small text-uppercase fw-bold"
                                            style="color: var(--primary-cyan);">Email</label>
                                        <input type="email" name="email" class="form-control custom-input" placeholder="tu@mail.com"
                                            required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label small text-uppercase fw-bold"
                                            style="color: var(--primary-cyan);">Universidad</label>
                                        <input type="text" name="university" class="form-control custom-input" placeholder="Ej. URJC - Móstoles"
                                            required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label class="form-label small text-uppercase fw-bold"
                                            style="color: var(--primary-cyan);">Avatar (Opcional)</label>
                                        <input type="file" name="imageFile" class="form-control custom-input text-white-50" accept="image/*">
                                    </div>

                                    <div class="col-md-6 mb-3">
                                        <label class="form-label small text-uppercase fw-bold"
                                            style="color: var(--primary-cyan);">Contraseña</label>
                                        <input type="password" name="password" class="form-control custom-input" placeholder="••••••••"
                                            required>
                                    </div>
                                    <div class="col-md-6 mb-4">
                                        <label class="form-label small text-uppercase fw-bold"
                                            style="color: var(--primary-cyan);">Confirmar Contraseña</label>
                                        <input type="password" name="confirmPassword" class="form-control custom-input" placeholder="••••••••"
                                            required>
                                    </div>
                                </div>

                                <div class="mb-4 form-check">
                                    <input type="checkbox" class="form-check-input" id="terms" required>
                                    <label class="form-check-label small text-white-50" for="terms">
                                        Acepto los <a href="#" style="color: var(--primary-cyan);">Términos de
                                            Competición</a> y Política de Privacidad.
                                    </label>
                                </div>

                                <button type="submit" class="btn btn-primary w-100 mb-3 shadow-glow">
                                    REGISTRARME Y EMPEZAR
                                </button>

                                <div class="text-center mt-3">
                                    <p class="text-white-50 small mb-0">¿Ya tienes cuenta?</p>
                                    <a href="/login" class="text-decoration-none fw-bold"
                                        style="color: var(--accent-green);">INICIAR SESIÓN</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    {{> footer}}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>

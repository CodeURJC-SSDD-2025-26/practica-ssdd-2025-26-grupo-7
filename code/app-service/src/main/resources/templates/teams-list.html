<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OneTap eLeague - Equipos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/team-list.css">
</head>

<body>
    {{> header}}

    <header class="page-header text-center">
        <div class="container">
            <h1 class="display-5 fw-bold text-white">Equipos Registrados</h1>
            <p class="lead text-white-50">Conoce a los competidores de la liga universitaria de eSports</p>
        </div>
    </header>

    <main class="container py-5">

        <p class="text-white-50 small mb-4">
            <i class="bi bi-shield-fill me-1 text-cyan"></i>Mostrando <strong class="text-white">5</strong> equipos
            registrados
        </p>

        <div class="row g-4">
            {{#teams}}
            <div class="col-lg-4 col-md-6">
                <div class="team-card h-100">
                    <div class="team-card-banner"></div>
                    <div class="team-card-logo-wrapper">
                        <img src="/images/teams/{{id}}" alt="{{name}} Logo"
                            class="team-card-logo rounded-circle shadow-sm">
                    </div>
                    <div class="team-card-body text-center">
                        <div class="team-card-info">
                            <h5 class="text-white fw-bold mb-1">{{name}}</h5>
                            <p class="text-white-50 small mb-2"><i class="bi bi-building me-1"></i>{{university}}</p>
                            <div class="d-flex justify-content-center gap-2 mb-3 flex-wrap">
                                <span class="badge bg-warning text-dark">{{mainGame}}</span>
                            </div>
                            <div class="team-stats-mini d-flex justify-content-around mb-3">
                                <div class="text-center">
                                    <div class="fw-bold text-white">{{matchesPlayed}}</div>
                                    <div class="text-white-50 stat-label">PARTIDOS</div>
                                </div>
                                <div class="text-center">
                                    <div class="fw-bold text-success">{{wins}}</div>
                                    <div class="text-white-50 stat-label">VICTORIAS</div>
                                </div>
                                <div class="text-center">
                                    <div class="fw-bold text-danger">{{losses}}</div>
                                    <div class="text-white-50 stat-label">DERROTAS</div>
                                </div>
                            </div>
                            <a href="/teams/{{id}}" class="btn btn-outline-info w-100">Ver Detalles del Equipo</a>
                        </div>
                    </div>
                </div>
            </div>
            {{/teams}}
        </div>
    </main>

    {{> footer}}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
